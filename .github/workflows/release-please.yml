on:
  push:
    branches:
      - main

name: release-please

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # Step 2: Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      # Step 3: Use release-please to create a release
      - name: Create release
        id: release  # Added ID for referencing outputs
        uses: googleapis/release-please-action@v5
        with:
          release-type: go

      # Step 4: Update the version in the build and perform multi-platform builds
      - name: Build for multiple platforms
        if: ${{ steps.release.outputs.release_created }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          echo "Building version ${VERSION}"

          VERSION_PATH="github.com/iton0/hkup-cli/v2/cmd.version"
          LDFLAGS="-s -w -X ${VERSION_PATH}=${VERSION}"

          mkdir -p bin

          GOOS=linux   GOARCH=amd64  go build -o bin/hkup-linux-amd64   -ldflags="$LDFLAGS" .
          GOOS=linux   GOARCH=arm64  go build -o bin/hkup-linux-aarch64  -ldflags="$LDFLAGS" .
          GOOS=darwin  GOARCH=amd64  go build -o bin/hkup-darwin-amd64  -ldflags="$LDFLAGS" .
          GOOS=darwin  GOARCH=arm64  go build -o bin/hkup-darwin-aarch64 -ldflags="$LDFLAGS" .
          GOOS=windows GOARCH=amd64  go build -o bin/hkup.exe            -ldflags="$LDFLAGS" .

          # Generate SHA256 checksums
          cd bin
          for f in hkup-linux-amd64 hkup-linux-aarch64 hkup-darwin-amd64 hkup-darwin-aarch64 hkup.exe; do
            sha256sum "$f" | awk '{print $1}' > "${f}.sha256"
          done

      # Step 5: Upload Release Artifacts if a release was created
      - name: Upload Release Artifacts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.release.outputs.tag_name }} \
            bin/*
